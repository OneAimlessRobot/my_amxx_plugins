//dispatcher cfg

name REBORN_SHERO_HLTV_dispatcher

hostname REBORN_SHERO_HLTV_dispatcher // public HLTV server name


nomaster 0 // don't register at WON/STEAM master servers

publicgame 1 // don't show game server IP

dispatchmode 2 // should dispatch all clients to other proxies?

